<body>
  <div class="bg-video-wrap">
    <video class="bg-video" autoplay muted loop playsinline poster="assets/bg-video-poster.jpg">

  <script>
    document.getElementById('login-btn').addEventListener('click', () => {
      window.location.href = `${window.API_BASE_URL}/auth/login`;

    // Si deja connecte, saute directement au dashboard.
    Api.me().then(() => { window.location.href = 'app.html'; }).catch(() => {});
