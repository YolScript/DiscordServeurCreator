<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Discord Serveur Creator</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-box">
      <div class="brand"><span class="brand-mark"></span>Discord Serveur Creator</div>
      <p class="lede">Panel d'administration des serveurs generes par le bot.</p>
      <div class="card">
        <p style="margin-top:0;">Connecte-toi avec ton compte Discord pour gerer tes serveurs.</p>
        <button class="btn" id="login-btn" style="width: 100%;">Se connecter avec Discord</button>
      </div>
      <p class="muted" id="status"></p>
    </div>
  </div>

  <script src="assets/config.js"></script>
  <script src="assets/api.js"></script>
  <script>
    document.getElementById('login-btn').addEventListener('click', () => {
      window.location.href = `${window.API_BASE_URL}/auth/login`;
    });

    // Si deja connecte, saute directement au dashboard.
    Api.me().then(() => { window.location.href = 'app.html'; }).catch(() => {});
  </script>
</body>
</html>
