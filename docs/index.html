<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Discord Serveur Creator</title>
  <link rel="icon" type="image/png" href="assets/favicon-64.png" />
  <link rel="stylesheet" href="assets/style.css?v=25" />
  <script>
    (function () {
      var t = localStorage.getItem('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    }());
  </script>
</head>
<body>
  <div class="bg-video-wrap">
    <video class="bg-video" autoplay muted loop playsinline poster="assets/bg-video-poster.jpg">
      <source src="assets/bg-video.mp4" type="video/mp4" />
    </video>
    <div class="bg-overlay"></div>
  </div>
  <div class="auth-shell">
    <div class="auth-box">
      <div class="brand" title="Discord Serveur Creator">
        <img class="brand-icon" src="assets/logo-512.png" alt="Discord Serveur Creator" />
        <span class="brand-text">Discord Serveur Creator</span>
      </div>
      <p class="lede">Panel d'administration des serveurs generes par le bot.</p>
      <div class="card">
        <p style="margin-top:0;">Connecte-toi avec ton compte Discord pour gerer tes serveurs.</p>
        <button class="btn" id="login-btn" style="width: 100%;">Se connecter avec Discord</button>
      </div>
      <p class="muted" id="status"></p>
    </div>
  </div>

  <script src="assets/config.js?v=5"></script>
  <script src="assets/sounds.js?v=1"></script>
  <script src="assets/api.js?v=17"></script>
  <script src="assets/microinteractions.js?v=1"></script>
  <script>
    document.getElementById('login-btn').addEventListener('click', () => {
      window.location.href = `${window.API_BASE_URL}/auth/login`;
    });

    // Si deja connecte, saute directement au dashboard.
    Api.me().then(() => { window.location.href = 'app.html'; }).catch(() => {});

    document.querySelectorAll('.bg-video').forEach((v) => {
      v.play().catch(() => {});
      v.addEventListener('pause', () => v.play().catch(() => {}));
    });
  </script>
</body>
</html>
