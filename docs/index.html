<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Discord Serveur Creator</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <main style="max-width: 420px; margin-top: 15vh; text-align: center;">
    <h1 style="background: linear-gradient(90deg, #e63946, #219ebc); -webkit-background-clip: text; background-clip: text; color: transparent;">
      Discord Serveur Creator
    </h1>
    <p class="muted">Panel d'administration des serveurs generes par le bot.</p>
    <div class="card">
      <p>Connecte-toi avec ton compte Discord pour gerer tes serveurs.</p>
      <button class="btn" id="login-btn" style="width: 100%; justify-content: center;">Se connecter avec Discord</button>
    </div>
    <p class="muted" id="status"></p>
  </main>

  <script src="assets/config.js"></script>
  <script src="assets/api.js"></script>
  <script>
    document.getElementById('login-btn').addEventListener('click', () => {
      window.location.href = `${window.API_BASE_URL}/auth/login`;
    });

    // Si deja connecte, saute directement au dashboard.
    Api.me().then(() => { window.location.href = 'app.html'; }).catch(() => {});
  </script>
</body>
</html>
