<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Discord Serveur Creator - Dashboard</title>
  <link rel="icon" type="image/png" href="assets/favicon-64.png" />
  <link rel="stylesheet" href="assets/style.css?v=3" />
</head>
<body>
  <div class="shell">
    <aside class="rail" id="rail"></aside>
    <aside class="sidebar" id="sidebar"></aside>
    <main class="content">
      <div class="content-topbar">
        <div class="search-box" id="search-box" style="display:none;">
          <input type="text" id="search-input" placeholder="Rechercher un serveur..." />
        </div>
        <span class="spacer"></span>
        <button class="user-chip" id="logout-btn" title="Se deconnecter">
          <img class="user-avatar" id="user-avatar" alt="" />
          <span id="whoami"></span>
        </button>
      </div>
      <div class="content-body" id="app">
        <p class="muted">Chargement...</p>
      </div>
    </main>
  </div>

  <script src="assets/config.js?v=2"></script>
  <script src="assets/api.js?v=2"></script>
  <script src="assets/app.js?v=3"></script>
</body>
</html>
