<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Discord Serveur Creator - Dashboard</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="assets/favicon-64.png?v=3" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#1a1013" />
  <link rel="stylesheet" href="assets/style.css?v=94" />
  <script>
    (function () {
      var t = localStorage.getItem('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    }());
  </script>
</head>
<body>
  <a href="#app" class="skip-link">Aller au contenu</a>
  <div class="bg-video-wrap">
    <video class="bg-video" autoplay muted loop playsinline poster="assets/bg-video-poster.jpg?v=3">
      <source src="assets/bg-video.mp4?v=3" type="video/mp4" />
    </video>
    <div class="bg-overlay"></div>
  </div>
  <div class="shell">
    <main class="content">
      <div class="content-topbar" id="content-topbar">
        <a href="app.html" class="topbar-brand" title="Discord Serveur Creator">
          <picture>
            <source srcset="assets/logo-512.webp?v=3" type="image/webp" />
            <img class="brand-icon" src="assets/logo-512.png?v=3" alt="Accueil" width="30" height="30" />
          </picture>
        </a>
        <div class="topbar-guilds" id="topbar-guilds"></div>
        <div class="topbar-right">
          <div class="search-box" id="search-box" style="display:none;">
            <button class="search-box-toggle" id="search-box-toggle" aria-label="Ouvrir la recherche">⌕</button>
            <input type="text" id="search-input" placeholder="Rechercher un serveur..." aria-label="Rechercher un serveur" />
          </div>
          <button class="video-toggle" id="pwa-install-btn" title="Installer l'application" aria-label="Installer l'application" style="display:none;">📲</button>
          <button class="video-toggle" id="density-toggle-btn" title="Mode compact" aria-label="Mode compact">▤</button>
          <button class="video-toggle" id="video-toggle-btn" title="Couper la video de fond" aria-label="Couper la video de fond">🎬</button>
          <button class="theme-toggle" id="theme-toggle-btn" title="Changer de theme" aria-label="Changer de theme">🌙</button>
          <button class="user-chip" id="logout-btn" title="Se deconnecter">
            <img class="user-avatar" id="user-avatar" alt="" />
            <span id="whoami"></span>
          </button>
        </div>
      </div>
      <div class="content-body" id="app" tabindex="-1">
        <div class="skeleton-block">
          <div class="skeleton-line" style="width:100%"></div>
          <div class="skeleton-line" style="width:92%"></div>
          <div class="skeleton-line" style="width:60%"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="assets/config.js?v=5" defer></script>
  <script src="assets/sounds.js?v=1" defer></script>
  <script src="assets/api.js?v=42" defer></script>
  <script src="assets/app.js?v=133" defer></script>
  <script src="assets/microinteractions.js?v=1" defer></script>
  <script src="assets/bgvideo.js?v=4"></script>
  <script>
    // Service worker (coquille offline + ouverture instantanee).
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    }
    // Bouton d'installation PWA : visible seulement quand le navigateur
    // propose l'installation (beforeinstallprompt) et pas deja installe.
    (function () {
      var deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        deferredPrompt = e;
        var btn = document.getElementById('pwa-install-btn');
        if (btn && !window.matchMedia('(display-mode: standalone)').matches) btn.style.display = '';
      });
      document.addEventListener('click', function (e) {
        if (!e.target.closest || !e.target.closest('#pwa-install-btn') || !deferredPrompt) return;
        deferredPrompt.prompt();
        deferredPrompt.userChoice.finally(function () {
          deferredPrompt = null;
          document.getElementById('pwa-install-btn').style.display = 'none';
        });
      });
      window.addEventListener('appinstalled', function () {
        var btn = document.getElementById('pwa-install-btn');
        if (btn) btn.style.display = 'none';
      });
    })();
  </script>
</body>
</html>
