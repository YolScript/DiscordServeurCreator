name = "discord-serveur-creator-worker"
main = "src/index.js"
compatibility_date = "2025-01-01"

kv_namespaces = [
  { binding = "GUILD_KV", id = "aeb9e5560f154dacbcd3e3cee5e9dad0" }
]

# Trois crons :
# - 4h00 : snapshot automatique quotidien de la structure (roles/salons) de
#   chaque serveur configure, garde les 5 derniers par serveur.
# - toutes les 10 min : ping du bot heberge sur Render (free tier endormi
#   apres 15 min d'inactivite) pour le maintenir eveille.
# - dimanche 5h00 : sauvegarde complete du KV (cles guild:*/bot:*) dans
#   backup:<date>, 4 dernieres conservees.
[triggers]
crons = ["0 4 * * *", "*/10 * * * *", "0 5 * * 0"]

[vars]
BOT_KEEPALIVE_URL = "https://discordserveurcreator.onrender.com/"
DISCORD_CLIENT_ID = "1526237674355036401"
OAUTH_REDIRECT_URI = "https://discord-serveur-creator-worker.energiecraft-online.workers.dev/auth/callback"
FRONTEND_ORIGIN = "https://yolscript.github.io"
FRONTEND_REDIRECT_URL = "https://yolscript.github.io/DiscordServeurCreator/app.html"

# Secrets a definir via `wrangler secret put <NOM>` (jamais dans ce fichier) :
#   DISCORD_CLIENT_SECRET
#   DISCORD_BOT_TOKEN
#   AI_KEY_ENCRYPTION_SECRET (chiffrement au repos des cles API IA fournies par les serveurs)
