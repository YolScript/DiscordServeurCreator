name = "discord-serveur-creator-worker"
main = "src/index.js"
compatibility_date = "2025-01-01"

kv_namespaces = [
  { binding = "GUILD_KV", id = "REPLACE_AVEC_TON_NAMESPACE_ID" }
]

[vars]
DISCORD_CLIENT_ID = "REPLACE_AVEC_TON_CLIENT_ID"
OAUTH_REDIRECT_URI = "https://REPLACE.workers.dev/auth/callback"
FRONTEND_ORIGIN = "https://REPLACE.github.io"

# Secrets a definir via `wrangler secret put <NOM>` (jamais dans ce fichier) :
#   DISCORD_CLIENT_SECRET
#   DISCORD_BOT_TOKEN
